name: MLB close-game poller

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: mlb-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poller
        env:
          SUBSCRIBERS_JSON: ${{ secrets.SUBSCRIBERS_JSON }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}
          NTFY_PRIORITY: ${{ vars.NTFY_PRIORITY || 'high' }}
          STATE_PATH: state.json
        run: python poll.py

      - name: Commit state if changed
        run: |
          if ! git diff --quiet state.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update alert state [skip ci]"
            git push
          else
            echo "No state change."
          fi
